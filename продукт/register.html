<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Lumiere</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        body {
            background: #0B1120;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }
        .register-box {
            background: #1A2A44;
            padding: 40px 50px;
            border-radius: 24px;
            width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            text-align: center;
            border: 1px solid #2D3A5E;
        }
        .logo {
            font-size: 2.8rem;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #7AA9E0, #F1C40F);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }
        input, select {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            background: #0F1828;
            border: 1px solid #2D3A5E;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #F1C40F;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2ECC71;
            color: #0B1120;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 16px;
        }
        button:hover {
            background: #27AE60;
        }
        .error {
            color: #E74C3C;
            margin-top: 12px;
            font-size: 0.9rem;
        }
        .link {
            margin-top: 16px;
            font-size: 0.9rem;
            color: #8AA0C0;
        }
        .link a {
            color: #F1C40F;
            text-decoration: none;
        }
        .link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="register-box">
        <div class="logo">⚙️ LUMIERE</div>
        <h2>Регистрация</h2>
        <input type="text" id="fullName" placeholder="Имя и фамилия">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль (минимум 6 символов)">
        <select id="role">
            <option value="dispatcher">Диспетчер</option>
            <option value="master">Мастер</option>
            <option value="admin">Администратор</option>
        </select>
        <button onclick="register()">Зарегистрироваться</button>
        <div id="error" class="error"></div>
        <div class="link">Уже есть аккаунт? <a href="login.html">Войти</a></div>
    </div>

    <script>
        async function register() {
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const role = document.getElementById('role').value;
            const errorDiv = document.getElementById('error');

            if (!fullName || !email || !password) {
                errorDiv.textContent = '❌ Заполните все поля';
                return;
            }

            if (password.length < 6) {
                errorDiv.textContent = '❌ Пароль должен быть не менее 6 символов';
                return;
            }

            // 1. Регистрация в Supabase Auth
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password
            });

            if (error) {
                errorDiv.textContent = '❌ ' + error.message;
                return;
            }

            // 2. Сохраняем роль и имя в таблицу users
            const { error: insertError } = await supabase
                .from('users')
                .insert({
                    id: data.user.id,
                    email: email,
                    full_name: fullName,
                    role: role
                });

            if (insertError) {
                errorDiv.textContent = '❌ Ошибка сохранения роли: ' + insertError.message;
                return;
            }

            alert('✅ Регистрация успешна! Теперь войдите.');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
